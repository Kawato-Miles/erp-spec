function calcProfitMargin(unitPrice, costEstimate) {
  if (costEstimate == null || unitPrice == null) return null;
  if (unitPrice <= 0) return null;
  const margin = ((unitPrice - costEstimate) / unitPrice * 100);
  return Math.round(margin * 100) / 100;  // 小數點後 2 位
}

function getProfitMarginColor(margin) {
  if (margin == null) return '';
  if (margin >= 30) return '#F6FFED';   // 綠色

/* ─────────────────────────── Helpers ───────────────────────────────── */
function fmtMoney(v) {
  if (v == null) return '—';
  return (Math.round(v * 100) / 100).toLocaleString('zh-TW', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtMoneyInt(v) {
  if (v == null) return '—';
  return Math.round(v).toLocaleString('zh-TW');  // 整數，無小數點
}
function calcItem(item) {
  // 費用優先使用手動輸入，否則自動計算
  const subtotal = item.amount != null ? item.amount : (item.unitPrice != null && item.qty != null ? item.unitPrice * item.qty : null);
  const total    = subtotal != null ? subtotal * (1 + TAX_RATE) : null;
  const profitMargin = calcProfitMargin(item.unitPrice, item.costEstimate);
  return { subtotal, total, profitMargin };
}
function calcSummary(items) {
  // 優先使用手動輸入的費用，否則自動計算
  const subtotal = items.reduce((s, i) => {
    const itemAmount = i.amount != null ? i.amount : (i.unitPrice != null && i.qty != null ? i.unitPrice * i.qty : 0);
    return s + itemAmount;
  }, 0);
  return { subtotal, tax: subtotal * TAX_RATE, total: subtotal * (1 + TAX_RATE) };
}

/* ─────────────────────────── Toast ─────────────────────────────────── */
function useToast() {
  const [toasts, setToasts] = React.useState([]);
  const show = (msg, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2500);
  };
  const ToastContainer = () => (
    <div style={{ position: 'fixed', top: 20, left: '50%', transform: 'translateX(-50%)', zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center', pointerEvents: 'none' }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          background: '#fff', borderRadius: 8, padding: '10px 20px',
          boxShadow: '0 4px 12px rgba(0,0,0,0.15)', display: 'flex', alignItems: 'center', gap: 10, fontSize: 14,
          border: `1px solid ${t.type === 'success' ? '#B7EB8F' : '#FFCCC7'}`
        }}>{t.msg}</div>
      ))}
    </div>
  );
  return { show, ToastContainer };
}

/* ─────────────────────────── Modal base ────────────────────────────── */
function Modal({ open, title, onClose, footer, children, width }) {
  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ width: width || 520 }}>
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

                  ) : (
                    <textarea value={item.spec || ''} onChange={e => updateItem(item.id, 'spec', e.target.value)} placeholder="例：A4 全彩正反面 105g 銅版紙、無光膜" style={{ width: '100%', minHeight: 60, fontSize: 12, border: '1px solid #D9D9D9', borderRadius: 4, padding: '8px 12px', fontFamily: 'inherit', resize: 'vertical' }} />
                  )}
                </div>
              </div>

              {/* 【價格】Section */}
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: '#000000E0', marginBottom: 12, paddingBottom: 8, borderBottom: '1px solid #F0F0F0' }}>價格</div>

                {/* 數量、報價單價、成本單價、費用、毛利率 - 一行五列 */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.2fr 1.2fr 1.2fr 1fr', gap: 12 }}>
                  <div>
                    <div style={{ fontSize: 12, color: '#00000073', marginBottom: 4 }}>數量</div>
                    {isLocked || managerFieldsReadOnly ? (
                      <span style={{ fontSize: 14, fontWeight: 500 }}>{item.qty?.toLocaleString() || '—'}</span>
                    ) : (
                      <input type="number" value={item.qty ?? ''} onChange={e => updateItem(item.id, 'qty', e.target.value ? Number(e.target.value) : null)} placeholder="0" style={{ width: '100%', textAlign: 'right', border: '1px solid #D9D9D9', borderRadius: 4, padding: '6px 8px', fontSize: 13, fontFamily: 'inherit' }} />
                    )}
                  </div>
                  <div>
                    <div style={{ fontSize: 12, color: '#00000073', marginBottom: 4 }}>報價單價</div>
                    {isLocked || managerFieldsReadOnly ? (
                      <span style={{ fontFamily: 'monospace', fontSize: 14, fontWeight: 500 }}>{item.unitPrice != null ? `$ ${fmtMoney(item.unitPrice)}` : '—'}</span>
                    ) : (
                      <input type="number" step="0.01" value={item.unitPrice ?? ''} onChange={e => handleUnitPriceChange(item.id, e.target.value)} placeholder="0.00" style={{ width: '100%', textAlign: 'right', border: '1px solid #D9D9D9', borderRadius: 4, padding: '6px 8px', fontSize: 13, fontFamily: 'inherit' }} />
                    )}
                  </div>
                  <div>
                    <div style={{ fontSize: 12, color: '#00000073', marginBottom: 4 }}>成本單價</div>
                    {canEditCost ? (
                      <input
                        type="text"
                        inputMode="decimal"
                        value={item.costEstimate ?? ''}
                        onChange={e => {
                          const val = e.target.value;
                          // 僅允許數字和一個小數點，最多兩位小數
                          const regex = /^\d*\.?\d{0,2}$/;
                          if (val === '' || regex.test(val)) {
                            updateItem(item.id, 'costEstimate', val ? Number(val) : null);
                          }
                        }}
                        placeholder="0.00"
                        style={{ width: '100%', textAlign: 'right', border: '1px solid #D9D9D9', borderRadius: 4, padding: '6px 8px', fontSize: 13, fontFamily: 'monospace' }}
                      />
                    ) : (
                      <span style={{ fontFamily: 'monospace', fontSize: 14 }}>{item.costEstimate != null ? `$ ${fmtMoney(item.costEstimate)}` : '—'}</span>
                    )}
                  </div>
                  <div>
                    <div style={{ fontSize: 12, color: '#00000073', marginBottom: 4 }}>費用（未稅）</div>
                    {isLocked || managerFieldsReadOnly ? (
                      <span style={{ fontFamily: 'monospace', fontSize: 14, fontWeight: 500, color: '#000000E0' }}>{subtotal != null ? `$ ${fmtMoneyInt(subtotal)}` : '—'}</span>
                    ) : (
                      item.amount != null ? (
                        <span style={{ fontFamily: 'monospace', fontSize: 14, fontWeight: 500, color: '#000000E0' }}>$ {fmtMoneyInt(item.amount)}</span>
                      ) : (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          <span style={{ fontFamily: 'monospace', fontSize: 14, fontWeight: 500, color: '#00000073' }}>{subtotal != null ? `$ ${fmtMoneyInt(subtotal)}` : '—'}</span>
                          <span style={{ fontSize: 11, color: '#52C41A', background: '#F6FFED', padding: '2px 6px', borderRadius: 2, fontWeight: 500 }}>自動</span>
                        </div>
                      )
                    )}
                  </div>
                  <div>
                    <div style={{ fontSize: 12, color: '#00000073', marginBottom: 4 }}>毛利率</div>
                    {(() => {
                      const margin = calcProfitMargin(item.unitPrice, item.costEstimate);
                      const bgColor = margin != null ? getProfitMarginColor(margin) : 'transparent';
                      return (
                        <span style={{ fontFamily: 'monospace', fontSize: 14, fontWeight: 500, background: bgColor, padding: '2px 6px', borderRadius: 3 }}>
                          {margin != null ? `${margin.toFixed(2)}%` : '—'}
                        </span>
                      );
                    })()}
                  </div>
                </div>
              </div>

              {/* 【配送資料】Section */}
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: '#000000E0', marginBottom: 12, paddingBottom: 8, borderBottom: '1px solid #F0F0F0' }}>配送資料</div>

                {/* 出貨方式 & 預計交貨日期 */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 12, color: '#00000073', marginBottom: 4 }}>出貨方式</div>
                    {isLocked || managerFieldsReadOnly ? (
                      <span style={{ fontSize: 14 }}>{item.delivery_method || '—'}</span>
                    ) : (
                      <input type="text" value={item.delivery_method || ''} onChange={e => updateItem(item.id, 'delivery_method', e.target.value)} placeholder="例：整疊、折好、TBD 等" style={{ width: '100%', border: '1px solid #D9D9D9', borderRadius: 4, padding: '6px 8px', fontSize: 13, fontFamily: 'inherit' }} />
                    )}
                  </div>
                  <div>
                    <div style={{ fontSize: 12, color: '#00000073', marginBottom: 4 }}>預計交貨日期</div>
                    {isLocked || managerFieldsReadOnly ? (
                      <span style={{ fontSize: 14 }}>{item.estimated_delivery_date || '—'}</span>
                    ) : (
                      <input type="date" value={item.estimated_delivery_date || ''} onChange={e => updateItem(item.id, 'estimated_delivery_date', e.target.value)} style={{ width: '100%', border: '1px solid #D9D9D9', borderRadius: 4, padding: '6px 8px', fontSize: 13, fontFamily: 'inherit' }} />
                    )}
                  </div>
                </div>

                {/* 包裝說明 */}
                <div>
                  <div style={{ fontSize: 12, color: '#00000073', marginBottom: 4 }}>包裝說明</div>
                  {isLocked || managerFieldsReadOnly ? (
                    <span style={{ fontSize: 13, display: 'block', padding: '8px 12px', background: '#FAFAFA', borderRadius: 4, minHeight: 48, lineHeight: 1.5 }}>{item.packaging_note || '—'}</span>
                  ) : (
                    <textarea value={item.packaging_note || ''} onChange={e => updateItem(item.id, 'packaging_note', e.target.value)} placeholder="例：每 500 張一捆、外層打膜、貼標籤等" style={{ width: '100%', minHeight: 48, fontSize: 12, border: '1px solid #D9D9D9', borderRadius: 4, padding: '8px 12px', fontFamily: 'inherit', resize: 'vertical' }} />
                  )}
                </div>
              </div>

              {/* Attachments */}
              {item.attachments?.length > 0 && (
                <div style={{ borderTop: '1px solid #F0F0F0', paddingTop: 12, marginTop: 12 }}>
                  <div style={{ fontSize: 12, color: '#00000073', marginBottom: 6 }}>參考附件</div>
                  <div className="attach-list">
                    {item.attachments.map((a, idx) => (
                      <div key={idx} className="attach-item">
                        <span style={{ fontSize: 11, color: '#00000040' }}>{a.endsWith('.pdf') ? 'PDF' : 'IMG'}</span>
                        <span>{a}</span>
                      </div>
                    ))}
                    {!isLocked && <div className="attach-item" style={{ cursor: 'pointer', color: '#1677FF', borderStyle: 'dashed' }}>上傳附件</div>}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })}

      {items.length === 0 && <div className="empty">尚無印件項目</div>}

      {/* Summary */}
      {items.length > 0 && (
        <>
          <div className="items-summary">
            <div className="summary-item"><span className="summary-label">小計（未稅）</span><span className="summary-value">$ {fmtMoneyInt(summary.subtotal)}</span></div>
            <div className="summary-item"><span className="summary-label">稅額（5%）</span><span className="summary-value">$ {fmtMoneyInt(summary.tax)}</span></div>
          </div>
          <div style={{ background: '#E6F7FF', border: '2px solid #1677FF', borderRadius: '0 0 6px 6px', padding: '16px 20px', textAlign: 'right' }}>
            <div style={{ fontSize: 12, color: '#1677FF', marginBottom: 8, fontWeight: 500 }}>含稅總金額</div>
            <div style={{ fontSize: 24, fontWeight: 700, color: '#1677FF' }}>$ {fmtMoneyInt(summary.total)}</div>
          </div>
        </>
      )}

      {/* All attachments section */}
      {items.some(i => i.attachments?.length > 0) && (
        <div style={{ marginTop: 20 }}>
          <div className="divider" />
          <div style={{ fontWeight: 500, marginBottom: 12 }}>全部參考附件</div>
          {items.filter(i => i.attachments?.length > 0).map(item => (
            <div key={item.id} style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, color: '#00000073', marginBottom: 6 }}>{item.no} — {item.name}</div>
              <div className="attach-list">
                {item.attachments.map((a, idx) => (
                  <div key={idx} className="attach-item">
                    <span style={{ fontSize: 11, color: '#00000040' }}>{a.endsWith('.pdf') ? 'PDF' : 'IMG'}</span>
                    <span>{a}</span>
                  </div>
                ))}
                {!isLocked && <div className="attach-item" style={{ cursor: 'pointer', color: '#1677FF', borderStyle: 'dashed' }}>上傳附件</div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────── Price Log Tab ─────────────────────────── */
function PriceLogTab({ priceLogs }) {
  if (priceLogs.length === 0) return <div className="empty">尚無報價紀錄。印務主管完成評估後，系統將自動建立快照。</div>;
  return (
    <div>
      {[...priceLogs].reverse().map(log => (
        <div key={log.id} className="price-log-card">
          <div className="price-log-header">
            <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
              <span style={{ fontWeight: 600 }}>報價紀錄 #{log.id}</span>
              <span className="price-log-round">第 {log.round} 輪</span>
              <span style={{ fontSize: 12, color: '#00000073' }}>評估者：{log.evaluatedBy}</span>
            </div>
            <span style={{ fontSize: 12, color: '#00000073', white_space: 'nowrap' }}>{log.evaluatedAt}</span>
          </div>
          {log.note && (
            <div style={{ fontSize: 13, color: '#00000073', background: '#FAFAFA', borderRadius: 4, padding: '8px 12px', marginBottom: 12 }}>
              評估備註：{log.note}
            </div>
          )}
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: '#FAFAFA' }}>
                <th style={{ padding: '8px 12px', textAlign: 'left',  fontWeight: 500, borderBottom: '1px solid #F0F0F0' }}>項目名稱</th>
                <th style={{ padding: '8px 12px', textAlign: 'right', fontWeight: 500, borderBottom: '1px solid #F0F0F0', width: 120 }}>成本預估</th>
                <th style={{ padding: '8px 12px', textAlign: 'right', fontWeight: 500, borderBottom: '1px solid #F0F0F0', width: 80  }}>倍數</th>
                <th style={{ padding: '8px 12px', textAlign: 'right', fontWeight: 500, borderBottom: '1px solid #F0F0F0', width: 120 }}>報價單價</th>
              </tr>
            </thead>
            <tbody>
              {log.snapshot.map((s, i) => (
                <tr key={i} style={{ borderBottom: '1px solid #F9F9F9' }}>
                  <td style={{ padding: '8px 12px' }}>{s.name}</td>
                  <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace' }}>{s.costEstimate != null ? `$ ${fmtMoney(s.costEstimate)}` : '—'}</td>
                  <td style={{ padding: '8px 12px', textAlign: 'right' }}>{s.markup != null ? `${s.markup}×` : '—'}</td>
                  <td style={{ padding: '8px 12px', textAlign: 'right', fontFamily: 'monospace', fontWeight: 600 }}>{s.unitPrice != null ? `$ ${fmtMoney(s.unitPrice)}` : '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {/* Compare with previous round */}
          {log.round > 1 && priceLogs.find(p => p.round === log.round - 1) && (
            <div style={{ marginTop: 8, fontSize: 12, color: '#00000073' }}>
              與第 {log.round - 1} 輪比較：
              {log.snapshot.map((s, i) => {
                const prev = priceLogs.find(p => p.round === log.round - 1)?.snapshot[i];
                if (!prev || prev.unitPrice == null || s.unitPrice == null) return null;
                const diff = s.unitPrice - prev.unitPrice;
                return (
                  <span key={i} style={{ marginLeft: 12 }}>
                    {s.name} 報價單價 {diff < 0
                      ? <span style={{ color: '#389E0D' }}>調降 {fmtMoney(Math.abs(diff))}</span>
                      : diff > 0
                      ? <span style={{ color: '#CF1322' }}>調漲 {fmtMoney(diff)}</span>
                      : <span style={{ color: '#00000073' }}>不變</span>}
                  </span>
                );
              })}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* ─────────────────────────── Permission Tab ──────────────────────────── */
function PermissionTab({ qr, onUpdatePermissions, isOwner }) {
  const [searchVal, setSearchVal] = React.useState('');
  const [showDropdown, setShowDropdown] = React.useState(false);

  const currentPermissions = qr.viewPermissions || [];
  const grantedStaffIds = currentPermissions.map(p => p.staffId);
  const availableStaff = SALES_STAFF.filter(s => !grantedStaffIds.includes(s.id));
  const filtered = availableStaff.filter(s => s.name.includes(searchVal) || s.role.includes(searchVal));

  const handleGrantPermission = (staff) => {
    const now = new Date().toLocaleString('zh-TW');
    const updated = {
      staffId: staff.id,
      staffName: staff.name,
      grantedBy: '林雅婷', // 模擬當前用戶
      grantedAt: now,
    };
    const newPermissions = [...currentPermissions, updated];
    onUpdatePermissions(qr.id, { viewPermissions: newPermissions });
    setSearchVal('');
    setShowDropdown(false);
  };

  const handleRevokePermission = (staffId) => {
    const newPermissions = currentPermissions.filter(p => p.staffId !== staffId);
    onUpdatePermissions(qr.id, { viewPermissions: newPermissions });
  };

  return (
    <div>
      {/* 頁面說明 */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: '#000000D9', marginBottom: 8 }}>檢視權限管理</div>
        <div style={{ fontSize: 13, color: '#00000073', lineHeight: 1.6 }}>原則上僅建立者可查閱此需求單，您可以分享檢視權限給其他業務/諮詢。</div>
      </div>

      {/* 新增權限表單 - 僅擁有者可用 */}
      {isOwner && (
        <div className="permission-form" style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#000000D9', marginBottom: 12 }}>分享檢視權限</div>
          <div style={{ position: 'relative' }}>
            <div className="permission-search">
              <input
                type="text"
                placeholder="搜尋業務/諮詢名稱..."
                value={searchVal}
                onChange={e => { setSearchVal(e.target.value); setShowDropdown(true); }}
                onFocus={() => setShowDropdown(true)}
                style={{ flex: 1 }}
              />
            </div>
            {showDropdown && filtered.length > 0 && (
              <div className="permission-dropdown" style={{ width: '100%', marginTop: 4 }}>
                {filtered.map(staff => (
                  <div
                    key={staff.id}
                    className="permission-dropdown-item"
                    onClick={() => handleGrantPermission(staff)}
                  >
                    <div style={{ fontWeight: 500 }}>{staff.name}</div>
                    <div style={{ fontSize: 12, color: '#00000073' }}>{staff.role}</div>
                  </div>
                ))}
              </div>
            )}
            {showDropdown && filtered.length === 0 && availableStaff.length === 0 && (
              <div style={{ fontSize: 12, color: '#00000073', padding: 12 }}>所有人員已授予檢視權限</div>
            )}
            {showDropdown && filtered.length === 0 && availableStaff.length > 0 && searchVal && (
              <div style={{ fontSize: 12, color: '#00000073', padding: 12 }}>查無符合的人員</div>
            )}
          </div>
        </div>
      )}

      {/* 當前權限列表 */}
      {currentPermissions.length > 0 && (
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#000000D9', marginBottom: 12 }}>已授予權限（{currentPermissions.length}）</div>
          <div className="permission-list">
            {currentPermissions.map(perm => (
              <div key={perm.staffId} className="permission-item">
                <div className="permission-item-info">
                  <div>
                    <div className="permission-item-name">{perm.staffName}</div>
                    <div className="permission-item-meta">
                      <span>授予者：{perm.grantedBy}</span>
                      <span className="permission-item-time">{perm.grantedAt}</span>
                    </div>
                  </div>
                </div>
                {isOwner && (
                  <button
                    className="btn btn-danger btn-sm"
                    onClick={() => handleRevokePermission(perm.staffId)}
                    style={{ padding: '4px 12px', fontSize: 12 }}>
                    移除
                  </button>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {currentPermissions.length === 0 && !isOwner && (
        <div style={{ fontSize: 13, color: '#00000073', padding: 24, background: '#FAFAFA', borderRadius: 6, textAlign: 'center' }}>
          此需求單尚未分享檢視權限
        </div>
      )}

      {currentPermissions.length === 0 && isOwner && (
        <div style={{ fontSize: 13, color: '#00000073', padding: 24, background: '#FAFAFA', borderRadius: 6, textAlign: 'center' }}>
          尚未分享檢視權限給任何人
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────── Status Progress Bar ────────────────────── */
function StatusProgressBar({ qr }) {
  const { status } = qr;
  const allStates = ['需求確認中', '待評估報價', '已評估報價', '已提供報價', '議價中'];
  const currIdx   = allStates.indexOf(status);
  return (
    <div style={{ padding: '16px 24px' }}>
      <div style={{ fontWeight: 500, marginBottom: 12 }}>狀態進度</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
        {allStates.map((s, i) => {
          const done   = i < currIdx;
          const active = s === status;
          return (
            <React.Fragment key={s}>
              <span style={{
                padding: '3px 10px', borderRadius: 4, fontSize: 12, fontWeight: active ? 600 : 400,
                background: active ? '#1677FF' : done ? '#F6FFED' : '#FAFAFA',
                color:      active ? '#fff'    : done ? '#389E0D' : '#00000040',
                border:     `1px solid ${active ? '#1677FF' : done ? '#B7EB8F' : '#F0F0F0'}`,
              }}>
                {done ? '完成  ' : ''}{s}
              </span>
              {i < allStates.length - 1 && <span style={{ color: '#D9D9D9', fontSize: 12 }}>›</span>}
            </React.Fragment>
          );
        })}
        <span style={{ color: '#D9D9D9', margin: '0 2px', fontSize: 12 }}>›</span>
        <span style={{ padding: '3px 10px', borderRadius: 4, fontSize: 12, background: status === '成交' ? '#F6FFED' : '#FAFAFA', color: status === '成交' ? '#389E0D' : '#00000040', border: `1px solid ${status === '成交' ? '#B7EB8F' : '#F0F0F0'}`, fontWeight: status === '成交' ? 600 : 400 }}>成交</span>
        <span style={{ color: '#D9D9D9', margin: '0 4px', fontSize: 12 }}>/</span>
        <span style={{ padding: '3px 10px', borderRadius: 4, fontSize: 12, background: status === '流失' ? '#FFF2F0' : '#FAFAFA', color: status === '流失' ? '#CF1322' : '#00000040', border: `1px solid ${status === '流失' ? '#FFCCC7' : '#F0F0F0'}`, fontWeight: status === '流失' ? 600 : 400 }}>流失</span>
      </div>
    </div>
  );
}

/* ─────────────────────────── Basic Info Tab ────────────────────────── */
function BasicInfoTab({ qr, status, onUpdate, isViewOnly }) {
  const isLocked = status === '成交' || status === '流失' || isViewOnly;
  const [isEditing, setIsEditing] = React.useState(false);
  const [editData, setEditData] = React.useState(qr);

  const requiredFields = ['title', 'customer', 'sales', 'source', 'invoiceType', 'deadline', 'estimatedByManager'];

  const renderLabel = (label, fieldKey) => (
    <span>
      {label}
      {requiredFields.includes(fieldKey) && <span style={{ color: '#FF4D4F', marginLeft: 2 }}>*</span>}
    </span>
  );

  const handleEdit = () => setIsEditing(true);

  const handleChange = (key, val) => {
    setEditData({ ...editData, [key]: val });
  };

  const handleSave = () => {
    if (onUpdate) onUpdate(editData);
    setIsEditing(false);
  };

  const handleCancel = () => {
    setEditData(qr);
    setIsEditing(false);
  };

  return (
    <div>
      {status === '流失' && qr.lostReason && (
        <div className="alert alert-error" style={{ marginBottom: 16 }}>
          流失原因：<strong>{qr.lostReason}</strong>{qr.lostNote ? `　— ${qr.lostNote}` : ''}
        </div>
      )}
      {status === '成交' && qr.linkedOrderId && (
        <div className="alert alert-info" style={{ marginBottom: 16 }}>
          已建立關聯訂單：<strong style={{ color: '#1677FF' }}>{qr.linkedOrderId}</strong>
        </div>
      )}

      {/* Edit Mode Header */}
      {isEditing && (
        <div style={{ marginBottom: 16, paddingBottom: 16, borderBottom: '1px solid #F0F0F0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontWeight: 500, fontSize: 14, color: '#000000E0' }}>編輯基本資料</span>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn btn-default" onClick={handleCancel} style={{ padding: '6px 16px', fontSize: 13 }}>取消</button>

/* ─────────────────────────── State Buttons ─────────────────────────── */
function StateButtons({ qr, role, onTransition }) {
  const { status } = qr;
  if (status === '流失') return <StatusTag status="流失" />;
  if (status === '成交') return (
    <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
      {role === 'sales' && !qr.linkedOrderId && (
        <button className="btn btn-primary" onClick={() => onTransition('建立訂單')}>轉建訂單</button>
      )}
    </div>
  );
  const btns = [];
  if (status === '需求確認中' && role === 'sales')
    btns.push(<button key="send" className="btn btn-primary"  onClick={() => onTransition('送印務評估')}>送印務評估</button>);
  if (status === '待評估報價' && role === 'manager')
    btns.push(<button key="eval" className="btn btn-primary"  onClick={() => onTransition('評估完成')}>評估完成</button>);
  if (status === '已評估報價' && role === 'sales')
    btns.push(<button key="provide" className="btn btn-primary" onClick={() => onTransition('對外提供報價')}>對外提供報價</button>);
  if (status === '已提供報價' && role === 'sales')
    btns.push(<button key="neg" className="btn btn-default" onClick={() => onTransition('進入議價')}>客戶回應，進入議價</button>);
  if (status === '議價中') {
    if (role === 'sales') {
      btns.push(<button key="reassess" className="btn btn-default" onClick={() => onTransition('重新評估報價')}>重新評估報價</button>);
      btns.push(<button key="win"  className="btn btn-primary" onClick={() => onTransition('成交')}>成交</button>);
      btns.push(<button key="lose" className="btn btn-danger"  onClick={() => onTransition('流失')}>流失</button>);
    }
  }
  if (btns.length === 0)
    return <span style={{ fontSize: 13, color: '#00000040' }}>目前角色（{role === 'sales' ? '業務' : '印務主管'}）在此狀態無可用操作。</span>;
  return <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>{btns}</div>;
}

/* ─────────────────────────── Detail Page ───────────────────────────── */
function DetailPage({ qrId, data, onBack, role, updateQR, toast }) {
  const [activeTab,     setActiveTab]     = React.useState('basic');
  const [items,         setItems]         = React.useState(() => data.find(q => q.id === qrId).items);
  const [lostOpen,      setLostOpen]      = React.useState(false);
  const [evalOpen,      setEvalOpen]      = React.useState(false);
  const [reassessOpen,  setReassessOpen]  = React.useState(false);

  const freshQR = data.find(q => q.id === qrId);
  const isOwner = freshQR.createdBy === '林雅婷'; // 模擬當前用戶
  const hasViewPermission = isOwner || (freshQR.viewPermissions && freshQR.viewPermissions.some(p => p.staffName === '林雅婷'));
  const isViewOnly = !isOwner && hasViewPermission;
  const syncItems = newItems => { setItems(newItems); updateQR(qrId, { items: newItems }); };

  const handleTransition = action => {
    if (action === '流失')           { setLostOpen(true); return; }
    if (action === '評估完成')       { setEvalOpen(true); return; }
    if (action === '重新評估報價')   { setReassessOpen(true); return; }

    const now    = new Date().toLocaleString('zh-TW').replace(/\//g, '-');
    const actor  = role === 'sales' ? '林雅婷' : '陳建宏';
    const states = { '送印務評估': '待評估報價', '對外提供報價': '已提供報價', '進入議價': '議價中', '成交': '成交', '退回重評估': '待評估報價', '重新評估報價': '待評估報價' };
    const newStatus = states[action];

    if (action === '建立訂單') {
      const orderId = `ORD-${new Date().toISOString().slice(0,10).replace(/-/g,'')}-01`;
      const log = { id: freshQR.activityLog.length + 1, time: now, actor, event: `建立關聯訂單：${orderId}` };
      updateQR(qrId, { linkedOrderId: orderId, activityLog: [...freshQR.activityLog, log] });
      toast(`訂單 ${orderId} 已建立`);
      return;
    }

    let eventText = `狀態變更：${freshQR.status} → ${newStatus}`;
    if (action === '送印務評估')  eventText += '，Slack 通知已發送';
    if (action === '退回重評估') eventText += '（退回印務重評，需調整方案）';
    if (action === '重新評估報價') eventText += '（業務申請重新評估成本）';
    const log = { id: freshQR.activityLog.length + 1, time: now, actor, event: eventText };
    updateQR(qrId, { status: newStatus, activityLog: [...freshQR.activityLog, log], updatedAt: now });
    toast(action + ' 操作成功');
  };

  const handleLost = (reason, note) => {
    const now   = new Date().toLocaleString('zh-TW').replace(/\//g, '-');
    const log   = { id: freshQR.activityLog.length + 1, time: now, actor: '林雅婷', event: `狀態變更：${freshQR.status} → 流失（原因：${reason}）` };
    updateQR(qrId, { status: '流失', lostReason: reason, lostNote: note, activityLog: [...freshQR.activityLog, log], updatedAt: now });
    setLostOpen(false);
    toast('已標記為流失');
  };

  const handleEvaluate = () => {
    const now      = new Date().toLocaleString('zh-TW').replace(/\//g, '-');
    const nextRound = (freshQR.priceLogs.length || 0) + 1;
    const snapshot = items.map(i => ({ name: i.name, costEstimate: i.costEstimate, unitPrice: i.unitPrice }));
    const newLog   = { id: nextRound, round: nextRound, evaluatedAt: now, evaluatedBy: '陳建宏（印務主管）', note: '', snapshot };
    const actLog   = { id: freshQR.activityLog.length + 1, time: now, actor: '陳建宏', event: `狀態變更：待評估報價 → 已評估報價（自動建立報價紀錄 #${nextRound}）` };
    updateQR(qrId, { status: '已評估報價', priceLogs: [...freshQR.priceLogs, newLog], activityLog: [...freshQR.activityLog, actLog], items, updatedAt: now });
    setEvalOpen(false);
    toast(`評估完成，已建立報價紀錄（第 ${nextRound} 輪）`);
  };

  const handleReassess = (note) => {
    const now   = new Date().toLocaleString('zh-TW').replace(/\//g, '-');
    let eventText = `狀態變更：${freshQR.status} → 待評估報價（業務申請重新評估成本）`;
    if (note && note.trim()) {
      eventText += `；調整說明：${note}`;
    }
    const log   = { id: freshQR.activityLog.length + 1, time: now, actor: '林雅婷', event: eventText };
    updateQR(qrId, { status: '待評估報價', activityLog: [...freshQR.activityLog, log], updatedAt: now });
    setReassessOpen(false);
    toast('已回退待評估報價，請與印務主管討論成本方案');
  };

  const tabs = role === 'manager'
    ? [
        { key: 'spec',       label: `印件規格與成本（${items.length}）` },
        { key: 'activity',   label: `活動紀錄（${freshQR.activityLog.length}）` },
      ]
    : [
        { key: 'basic',      label: '基本資料' },
        { key: 'spec',       label: `印件規格與成本（${items.length}）` },
        { key: 'pricelog',   label: `報價紀錄（${freshQR.priceLogs.length}）` },
        { key: 'activity',   label: `活動紀錄（${freshQR.activityLog.length}）` },
        { key: 'permission', label: `權限管理（${freshQR.viewPermissions?.length || 0}）` },
      ];

  return (
    <div>
      <div className="breadcrumb">
        <span onClick={onBack}>需求單管理</span>
        <span className="breadcrumb-sep">›</span>
        <span>{freshQR.quoteNo}</span>
      </div>

      {isViewOnly && (
        <div style={{ background: '#FFFBE6', border: '1px solid #FFE58F', borderRadius: 6, padding: '12px 16px', marginBottom: 16, fontSize: 14, color: '#D46B08', display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontWeight: 500 }}>你有檢視權限</span>
          <span style={{ color: '#FA8C16', fontSize: 12 }}>此需求單由 {freshQR.createdBy} 建立。你可以檢視所有資訊，但無法進行編輯。</span>
        </div>
      )}

      {/* Card 1: Project Info & Status */}
      <div style={{ background: '#fff', borderRadius: 8, border: '1px solid #F0F0F0', boxShadow: '0 1px 2px rgba(0,0,0,0.06)', marginBottom: 16, overflow: 'hidden' }}>
        {/* Title & Action Buttons Row */}
        <div style={{ padding: '20px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16 }}>
          <h1 style={{ fontSize: 18, fontWeight: 600, color: '#000000E0', margin: 0, flex: 1 }}>{freshQR.title}</h1>
          <div style={{ flexShrink: 0 }}>
            <StateButtons qr={freshQR} role={role} onTransition={handleTransition} />
          </div>
        </div>

        {/* Key Info Section */}
        <div style={{ padding: '20px 24px' }}>
          {/* Key Info Grid */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24 }}>
            <div>
              <div style={{ fontSize: 11, color: '#00000073', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>需求單號</div>
              <div style={{ fontSize: 14, fontWeight: 600, fontFamily: 'monospace', color: '#1677FF' }}>{freshQR.quoteNo}</div>
            </div>
            <div>
              <div style={{ fontSize: 11, color: '#00000073', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>最後更新</div>
              <div style={{ fontSize: 14, fontWeight: 400 }}>{freshQR.updatedAt}</div>
            </div>
            <div>
              <div style={{ fontSize: 11, color: '#00000073', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>報價輪次</div>
              <div style={{ fontSize: 14, fontWeight: 600 }}>{freshQR.priceLogs.length} 輪</div>
            </div>
          </div>
        </div>

        {/* Status Progress Bar */}
        <StatusProgressBar qr={freshQR} />
      </div>

      {/* Card 2: Tabs & Content */}
      <div style={{ background: '#fff', borderRadius: 8, border: '1px solid #F0F0F0', boxShadow: '0 1px 2px rgba(0,0,0,0.06)', overflow: 'hidden' }}>
        <div style={{ borderBottom: '1px solid #F0F0F0' }}>
          <div className="tabs-nav" style={{ padding: '0 24px', margin: 0 }}>
            {tabs.map(t => <div key={t.key} className={`tab-item ${activeTab === t.key ? 'active' : ''}`} onClick={() => setActiveTab(t.key)}>{t.label}</div>)}
          </div>
        </div>

        <div style={{ padding: '20px 24px' }}>
          {activeTab === 'basic'    && <BasicInfoTab qr={freshQR} status={freshQR.status} onUpdate={updateQR} isViewOnly={isViewOnly} />}
          {activeTab === 'spec'     && <ItemSpecTab items={items} setItems={syncItems} status={freshQR.status} quoteNo={freshQR.quoteNo} role={role} isViewOnly={isViewOnly} />}
          {activeTab === 'permission' && <PermissionTab qr={freshQR} onUpdatePermissions={updateQR} isOwner={isOwner} />}
          {activeTab === 'pricelog' && <PriceLogTab priceLogs={freshQR.priceLogs} />}
          {activeTab === 'activity' && <ActivityTab activityLog={freshQR.activityLog} />}
        </div>
      </div>

      <LostModal open={lostOpen} onClose={() => setLostOpen(false)} onSubmit={handleLost} />
      <EvaluateCheckModal open={evalOpen} onClose={() => setEvalOpen(false)} onSubmit={handleEvaluate} items={items} />
      <ReassessModal open={reassessOpen} onClose={() => setReassessOpen(false)} onSubmit={handleReassess} />
    </div>
  );
}

/* ─────────────────────────── List Page ─────────────────────────────── */
function ListPage({ data, onSelect, role, onCreateQR }) {
  const [quoteNoFilter, setQuoteNoFilter] = React.useState('');
  const [titleFilter,   setTitleFilter]   = React.useState('');
  const [customerFilter, setCustomerFilter] = React.useState('');
  const [statusFilter,  setStatusFilter]  = React.useState('');
  const [dateRangeFilter, setDateRangeFilter] = React.useState({ start: '', end: '' });
  const [currentManager, setCurrentManager] = React.useState('陳建宏'); // 模擬當前登入的印務主管
  const salesList = [...new Set(data.map(q => q.sales))];

  const filtered = data.filter(q => {
    const matchQuoteNo = !quoteNoFilter || q.quoteNo.includes(quoteNoFilter);
    const matchTitle = !titleFilter || q.title.includes(titleFilter);
    const matchCustomer = !customerFilter || q.customer.includes(customerFilter);
    const matchStatus = !statusFilter || q.status === statusFilter;
    const matchDateStart = !dateRangeFilter.start || new Date(q.createdAt) >= new Date(dateRangeFilter.start);
    const matchDateEnd = !dateRangeFilter.end || new Date(q.createdAt) <= new Date(dateRangeFilter.end);

    // 印務主管視角：限制為分配給自己且「待評估報價」的需求單
    if (role === 'manager') {
      const matchManager = q.estimatedByManager === currentManager;
      const matchPendingStatus = q.status === '待評估報價';
      return matchManager && matchPendingStatus;
    }

    return matchQuoteNo && matchTitle && matchCustomer && matchStatus && matchDateStart && matchDateEnd;
  });

  const handleClearFilters = () => {
    setQuoteNoFilter('');
    setTitleFilter('');
    setCustomerFilter('');
    setStatusFilter('');
    setDateRangeFilter({ start: '', end: '' });
  };

  return (
    <div>

              style={{ padding: '6px 8px' }}
            />
          </div>
        </div>

        <div style={{ marginBottom: 12 }}>
          <span className="filter-label" style={{ fontWeight: 500 }}>狀態篩選</span>
          <select className="form-select" style={{ width: '100%', marginTop: 8, padding: '6px 8px' }} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
            <option value="">全部狀態</option>
            {Object.keys(STATUS_TAG).map(s => <option key={s}>{s}</option>)}
          </select>
        </div>

        <div style={{ marginBottom: 12 }}>
          <span className="filter-label" style={{ fontWeight: 500 }}>建立日期範圍</span>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginTop: 8 }}>

              <th>需求單號</th><th>需求案名</th><th>客戶名稱</th>
              <th>接單業務</th><th>狀態</th><th>權限</th><th>報價輪次</th>
              <th>報價截止日</th><th>最後更新</th>
              <th style={{ width: 60 }}>操作</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(qr => (
              <tr key={qr.id} onClick={() => onSelect(qr.id)}>
                <td style={{ fontFamily: 'monospace', color: '#1677FF' }}>{qr.quoteNo}</td>
                <td style={{ fontWeight: 500 }}>{qr.title}</td>
                <td>{qr.customer}</td>
                <td>{qr.sales}</td>
                <td><StatusTag status={qr.status} /></td>
                <td>
                  {qr.viewPermissions && qr.viewPermissions.length > 0
                    ? <span className="permission-badge permission-badge-shared">已分享 ({qr.viewPermissions.length})</span>
                    : <span className="permission-badge permission-badge-owner">僅我</span>}
                </td>
                <td style={{ textAlign: 'center' }}>
                  {qr.priceLogs.length > 0
                    ? <span style={{ fontSize: 12, fontFamily: 'monospace' }}>{qr.priceLogs.length} 輪</span>
                    : <span style={{ color: '#00000040', fontSize: 12 }}>—</span>}
                </td>
                <td style={{ color: qr.deadline && new Date(qr.deadline) < new Date() && qr.status !== '成交' && qr.status !== '流失' ? '#FF4D4F' : '#000000E0' }}>{qr.deadline || '—'}</td>
                <td style={{ fontSize: 12, color: '#00000073' }}>{qr.updatedAt}</td>
                <td onClick={e => e.stopPropagation()}>
                  <button className="btn btn-default btn-sm" onClick={() => onSelect(qr.id)}>查看</button>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && <tr><td colSpan="10" className="empty">查無符合條件的需求單</td></tr>}
          </tbody>
        </table>
        <div className="pagination">
          <span className="pagination-total">共 {filtered.length} 筆</span>
          <button className="pagination-btn">‹</button>
          <button className="pagination-btn active">1</button>
          <button className="pagination-btn">›</button>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────── App Root ──────────────────────────────── */
function App() {
  const [data,       setData]       = React.useState(initialData);
  const [view,       setView]       = React.useState('list');
  const [selectedId, setSelectedId] = React.useState(null);
  const [role,       setRole]       = React.useState('sales');
  const [createOpen, setCreateOpen] = React.useState(false);
  const { show: toast, ToastContainer } = useToast();

  const updateQR = (id, patch) => setData(d => d.map(q => q.id === id ? { ...q, ...patch } : q));

  const handleCreate = form => {
    const today   = new Date().toISOString().slice(0,10).replace(/-/g,'');
    const sameDay = data.filter(q => q.quoteNo.startsWith(`Q-${today}`)).length;
    const no      = `Q-${today}-${String(sameDay + 1).padStart(2, '0')}`;
    const now     = new Date().toLocaleString('zh-TW').replace(/\//g,'-');
    const newQR   = {
      id: 'QR' + Date.now(), quoteNo: no, title: form.title, customer: form.customer,
      sales: '林雅婷', createdBy: '林雅婷', status: '需求確認中', deadline: form.deadline, updatedAt: now, createdAt: now,
      source: form.source, invoiceType: form.invoiceType, slackUrl: '', lostReason: '', lostNote: '',
      items: [], priceLogs: [], viewPermissions: [],
      activityLog: [{ id: 1, time: now, actor: '林雅婷', event: '建立需求單，Slack 通知已發送' }],
    };
    setData(d => [newQR, ...d]);
    setCreateOpen(false);
    toast(`需求單 ${no} 建立成功`);
    setSelectedId(newQR.id);
    setView('detail');
  };

  return (
    <div>
      <ToastContainer />
      {/* Demo bar */}
      <div className="demo-bar">
        <span>Prototype 示範模式</span>
        <span style={{ margin: '0 8px', opacity: 0.4 }}>|</span>
        <span>目前角色：</span>
        <button className={`role-btn ${role === 'sales'   ? 'active' : ''}`} onClick={() => setRole('sales')}>業務</button>
        <button className={`role-btn ${role === 'manager' ? 'active' : ''}`} onClick={() => setRole('manager')}>印務主管</button>
        <span style={{ marginLeft: 16, opacity: 0.7 }}>切換角色可驗證 FR-020 角色權限</span>
      </div>

      <div className="layout">
        {/* Sidebar — 只呈現已確認開發的模組 */}
        <div className="sidebar">
          <div className="sidebar-logo">ERP 系統</div>
          <div className="nav-group-title">業務管理</div>
          <div className="nav-item active" onClick={() => setView('list')}>需求單管理</div>
        </div>

        <div className="main">
          <div className="content-area">
            {view === 'list'
              ? <ListPage data={data} onSelect={id => { setSelectedId(id); setView('detail'); }} role={role} onCreateQR={() => setCreateOpen(true)} />
              : <DetailPage qrId={selectedId} data={data} onBack={() => setView('list')} role={role} updateQR={updateQR} toast={toast} />}
          </div>
        </div>
      </div>

      <CreateQRModal open={createOpen} onClose={() => setCreateOpen(false)} onSubmit={handleCreate} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
