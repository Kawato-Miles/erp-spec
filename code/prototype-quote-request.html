<title>需求單模組 — ERP Prototype</title>
<!--
Prototype 版本：v4.6
製作日期：2026-03-02
更新內容：
  - v4.6 (2026-03-02)：子列表表格內容置中
    * 項目明細表格所有內容垂直水平置中（textAlign: center、verticalAlign: middle）
    * 包括表頭（<th>）和表體（<td>）
  - v4.5 (2026-03-02)：調整報價紀錄表格與評估備註樣式
    * 移除母列展開/收合 icon（✕ icon 欄位）
    * 評估備註內容靠左對齐（textAlign: left）
    * 母列欄位調整：3 欄（報價紀錄、評估日期、評估者）
  - v4.4 (2026-03-02)：報價紀錄分頁改成子母列表形式
    * 改用表格（table）呈現報價紀錄，統一列表頁樣式
    * 子母列表結構：母列顯示「報價紀錄、評估日期、評估者」，可展開檢視項目內容
    * 移除與前一輪的比較內容
    * 展開時顯示：評估備註（若有）+ 項目明細表格（成本總額、報價總額）
    * 內嵌表格樣式與主表格統一（色彩、字體、邊框）
  - v4.3 (2026-03-02)：統一字體為 Google Noto Sans TC，完整統一所有表格內容
    * 全域字體改為「Noto Sans TC」（含降級方案）
    * 列表表格（thead/tbody）：標題 14px/700、內容 14px/400，顏色均 #232324
    * 印件規格表格（.items-table）：補充 th/td 樣式，與列表表格規範一致
    * 修正表格內容的 inline style：
      - 編號欄位：移除 monospace，改 12px → 14px，色彩統一 #232324
      - 所有內容欄位：改 13px → 14px，色彩統一 #232324，font-weight 400
      - 數字欄位（成本/報價/毛利率）：移除 monospace 字體
    * 補充 .items-table 的 hover 和最後一列無邊框效果
  - v4.2 (2026-03-02)：調整彙總信息的顯示位置和方式
    * 彙總信息（小計、稅額、含稅總額）移至 Key Info Grid 中
    * 與「需求單號」、「最後更新」、「報價輪次」並列顯示（6 欄網格）
    * 使用相同的欄位排版規範（14px，weight 500/400）
    * 移除 StatusProgressBar 中的右上方彙總顯示
  - v4.1 (2026-03-02)：移除印件列表下方的彙總信息區塊
    * 刪除表格下方的彙總信息（小計、稅額、含稅總額）
    * 彙總信息現只顯示在狀態進度卡片中
  - v4.0 (2026-03-02)：統一進度卡片所有欄位排版規範
    * 欄位名稱（Label）：14px，weight 500，色彩 #636466
    * 欄位內容（Content）：14px，weight 400，色彩 #232324
    * 適用欄位：需求單號、最後更新、報價輪次、小計、稅額、含稅總額
    * 移除 uppercase、letterSpacing 等特殊排版
  - v3.8 (2026-03-02)：調整彙總信息位置
    * 彙總信息（小計、稅額、含稅總額）移至狀態進度卡片（右上方）
    * 恢復「新增印件項目」按鈕到印件規格與成本評估列表右上方
    * 表格下方恢復彙總顯示區
  - v3.6 (2026-03-02)：編號欄位設為不換行
    * 添加 CSS `white-space: nowrap` 確保編號始終顯示在單一行
  - v3.5 (2026-03-02)：修正規格備註與包裝說明欄位的換行顯示
    * 添加 CSS `white-space: pre-wrap` 保留換行符的顯示樣式
    * 規格備註與包裝說明現在能正確顯示多行內容
  - v3.4 (2026-03-02)：改變成本與報價欄位邏輯，改為直接輸入總額
    * 「成本單價」改名為「成本總額」
    * 「報價單價」改名為「報價總額」
    * 計算邏輯改變：費用直接等於報價總額（不再乘以數量）
    * 移除費用欄的單獨輸入框
    * 毛利率計算：(報價總額 - 成本總額) / 報價總額 × 100%
    * 初始化資料與報價紀錄已同步更新
  - v3.3 (2026-03-02)：調整固定列佈局、改善垂直對齐
    * 操作欄移到最右側（固定右邊）
    * 左側固定兩列：編號、項目名稱
    * 中間內容可水平滑動，同時保持左邊和右邊固定
    * 表格內容改為垂直置中（vertical-align: middle）
  - v3.2 (2026-03-02)：實現編輯模式 + 固定列 + 橫向滑動
    * 編輯行為改為：點擊「編輯」按鈕後，該列欄位才可編輯（非即時編輯）
    * 編輯模式下，按鈕轉為「確認」和「取消」
    * 列表左側固定三列：操作、編號、項目名稱（支援 position: sticky）
    * 其餘欄位支援水平滑動，保持左側三列可見
    * 編輯中的欄位背景改為淡黃色 (#FFFBE6) 提示
  - v3.1 (2026-03-02)：印件規格與成本評估改為可編輯列表（Editable Table 模式，參考 Ant Design）
  - v2.1 (2026-03-02)：議價流程優化 - 業務發起重新評估
    * 議價中狀態時，業務可點「重新評估報價」按鈕
    * 點擊後出現模態框，可選擇填寫「調整說明」（非必填）
    * 調整說明記錄在活動日誌，供印務主管參考
    * 移除印務主管在議價中的「退回重評估」操作（實務無此流程）
  - v2.0 (2026-03-02)：新增檢視權限管理功能
    * 新增「權限管理」Tab：顯示已授予檢視權限的人員清單
    * 支援新增檢視權限：搜尋並選擇業務/諮詢，授予檢視權限
    * 支援移除檢視權限：點擊移除按鈕即可回收權限
    * 權限紀錄：記錄誰授予權限、何時授予
    * 列表頁權限指示：顯示「僅我」或「已分享 (N 人)」標籤
  - v1.3 (2026-03-02)：加入需求單列表篩選功能
  - v1.2 (2026-03-02)：完成費用編輯功能、整數貨幣顯示、UI 布局優化
  - v1.1 (2026-03-02)：簡化成本預估邏輯，移除工序選擇 UI，新增毛利率欄位與視覺化

版本對應：
  - spec-quote-request.md (v1.5, 2026-03-02) - 改變成本與報價欄位邏輯，改為直接輸入總額
  - data-model.md (v0.10, 2026-03-02) - 調整 cost_estimate 和 price_per_unit 的語義說明
  - state-machines.md (v11, 2026-03-02) - 議價流程修正：業務發起重新評估
  - scenarios.md (2026-02-20) - 報價流程
  - ui-design-system.md (Ant Design 5.x, 2026-03-02) - 統一字體 Noto Sans TC + 表格規範

變更記錄：
- v4.6：子列表表格內容垂直水平置中
- v4.5：移除報價紀錄表格的展開 icon + 評估備註靠左對齐
- v4.4：報價紀錄分頁改成子母列表形式（表格 + 展開內嵌項目明細）
- v2.1：議價流程優化 - 業務發起「重新評估報價」（選填理由） + 移除印務主管退回權限
- v2.0：新增檢視權限管理（Tab + 新增/移除權限 + 列表指示）
- v1.3：列表篩選（文字/狀態/日期範圍）+ 清除篩選 + 結果統計
- v1.2：費用編輯 + 整數貨幣 + UI 布局優化 + calcSummary 修正
- v1.1：工序 UI 移除 + 毛利率視覺化
-->
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/antd@5.22.0/dist/antd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.4/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.22.0/dist/reset.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Noto Sans TC", -apple-system, "Segoe UI", sans-serif; font-size: 14px; background: #F2F2F2; }
  .layout { display: flex; min-height: 100vh; }
  /* Sidebar */
  .sidebar { width: 200px; background: #fff; border-right: 1px solid #F0F0F0; flex-shrink: 0; display: flex; flex-direction: column; }
  .sidebar-logo { padding: 20px 16px 12px; font-size: 15px; font-weight: 700; color: #1677FF; border-bottom: 1px solid #F0F0F0; }
  .nav-group-title { padding: 8px 16px 4px; font-size: 11px; color: #00000040; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 0 12px; height: 40px; cursor: pointer; border-radius: 6px; margin: 2px 8px; color: #636466; font-size: 14px; transition: background 0.15s; }
  .nav-item:hover { background: rgba(0,0,0,0.04); }
  .nav-item.active { background: #000000; color: #fff; }
  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .content-area { padding: 24px; overflow-y: auto; flex: 1; }
  /* Breadcrumb */
  .breadcrumb { font-size: 12px; color: #00000073; margin-bottom: 4px; }
  .breadcrumb span { cursor: pointer; }
  .breadcrumb span:hover { color: #1677FF; }
  .breadcrumb-sep { margin: 0 6px; }
  /* Page title */
  .page-title { font-size: 20px; font-weight: 600; color: #000000E0; margin: 0 0 16px; display: flex; align-items: center; gap: 12px; }
  /* Info banner */
  .info-banner { background: #E6F4FF; border-left: 3px solid #1677FF; border-radius: 6px; padding: 12px 16px; font-size: 14px; margin-bottom: 16px; color: #000000E0; }
  /* Toolbar */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .toolbar-left { display: flex; align-items: center; gap: 8px; }
  .toolbar-right { display: flex; align-items: center; gap: 8px; }
  .filter-label { color: #00000073; font-size: 14px; }
  /* Table */
  .table-wrap { background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #F0F0F0; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #FAFAFA; padding: 12px 8px; text-align: center; font-size: 14px; font-weight: 700; color: #232324; border-bottom: 1px solid #F0F0F0; white-space: nowrap; min-height: 48px; vertical-align: middle; }
  tbody td { padding: 8px; border-bottom: 1px solid #F0F0F0; font-size: 14px; color: #232324; font-weight: 400; vertical-align: middle; text-align: center; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #FAFAFA; cursor: pointer; }
  /* Tags */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
  .tag-draft    { background: #FAFAFA; border: 1px solid #D9D9D9; color: #00000073; }
  .tag-processing { background: #E6F4FF; border: 1px solid #91CAFF; color: #1677FF; }
  .tag-warning  { background: #FFFBE6; border: 1px solid #FFE58F; color: #D46B08; }
  .tag-success  { background: #F6FFED; border: 1px solid #B7EB8F; color: #389E0D; }
  .tag-error    { background: #FFF2F0; border: 1px solid #FFCCC7; color: #CF1322; }
  .tag-default  { background: #F9F0FF; border: 1px solid #D3ADF7; color: #531DAB; }
  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0 15px; height: 32px; border-radius: 6px; font-size: 14px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; font-family: inherit; }
  .btn-sm { height: 24px; padding: 0 10px; font-size: 12px; }
  .btn-primary { background: #1677FF; color: #fff; border-color: #1677FF; }
  .btn-primary:hover { background: #4096FF; border-color: #4096FF; }
  .btn-default { background: #fff; color: #000000E0; border-color: #D9D9D9; }
  .btn-default:hover { border-color: #1677FF; color: #1677FF; }
  .btn-danger  { background: #fff; color: #FF4D4F; border-color: #FF4D4F; }
  .btn-danger:hover { background: #FFF2F0; }
  .btn-danger-filled { background: #FF4D4F; color: #fff; border-color: #FF4D4F; }
  .btn-warning { background: #fff; color: #FA8C16; border-color: #FA8C16; }
  /* Detail */
  .tabs-nav { display: flex; border-bottom: 1px solid #F0F0F0; }
  .tab-item { padding: 12px 16px; cursor: pointer; font-size: 14px; color: #00000073; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab-item.active { color: #1677FF; border-bottom-color: #1677FF; font-weight: 500; }
  .tab-item:hover:not(.active) { color: #000000E0; }
  .tab-content { background: #fff; border-radius: 0 0 8px 8px; padding: 24px; }
  /* Forms */
  .form-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-item  { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .form-label { font-size: 14px; font-weight: 500; color: #000000E0; }
  .form-label.required::before { content: "* "; color: #FF4D4F; }
  .form-input { height: 32px; padding: 0 12px; border: 1px solid #D9D9D9; border-radius: 6px; font-size: 14px; outline: none; font-family: inherit; width: 100%; }
  .form-input:focus { border-color: #1677FF; box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
  .form-input.error { border-color: #FF4D4F; }
  .form-select { height: 32px; padding: 0 12px; border: 1px solid #D9D9D9; border-radius: 6px; font-size: 14px; outline: none; font-family: inherit; width: 100%; background: #fff; }
  .form-select:focus { border-color: #1677FF; }
  .form-textarea { padding: 8px 12px; border: 1px solid #D9D9D9; border-radius: 6px; font-size: 14px; outline: none; font-family: inherit; width: 100%; resize: vertical; min-height: 72px; }
  .form-textarea:focus { border-color: #1677FF; }
  .field-error { font-size: 12px; color: #FF4D4F; margin-top: 2px; }
  /* Items table */
  .items-table { border: 1px solid #F0F0F0; border-radius: 6px; overflow: hidden; margin-bottom: 0; border-collapse: collapse; }
  .items-table th { background: #FAFAFA; padding: 12px 8px; text-align: center; font-size: 14px; font-weight: 700; color: #232324; border-bottom: 1px solid #F0F0F0; white-space: nowrap; min-height: 48px; vertical-align: middle; }
  .items-table td { padding: 8px; border-bottom: 1px solid #F0F0F0; font-size: 14px; color: #232324; font-weight: 400; vertical-align: middle; text-align: center; }
  .items-table tr:last-child td { border-bottom: none; }
  .items-table tr:hover td { background: #FAFAFA; cursor: pointer; }
  .items-table input { border: 1px solid #D9D9D9; border-radius: 4px; padding: 6px 8px; font-size: 13px; width: 100%; font-family: inherit; outline: none; min-height: 36px; box-sizing: border-box; }
  .items-table input:focus { border-color: #1677FF; }
  .items-summary { background: #FAFAFA; padding: 12px 16px; border: 1px solid #F0F0F0; border-top: none; border-radius: 0 0 6px 6px; display: flex; justify-content: flex-end; gap: 24px; font-size: 13px; }
  .summary-item { display: flex; gap: 8px; }
  .summary-label { color: #00000073; }
  .summary-value { font-weight: 600; color: #000000E0; min-width: 80px; text-align: right; }
  /* Items table wrapper - for horizontal scrolling */
  .items-table-wrapper { overflow-x: auto; border: 1px solid #F0F0F0; border-radius: 6px; margin-bottom: 0; }
  /* Fixed columns */
  .items-table th.col-fixed, .items-table td.col-fixed { position: sticky; background: #fff; z-index: 1; }
  .items-table th.col-no { left: 0; background: #FAFAFA; z-index: 2; width: 80px; min-width: 80px; }
  .items-table td.col-no { left: 0; width: 80px; min-width: 80px; }
  .items-table th.col-name { left: 80px; background: #FAFAFA; z-index: 2; width: 140px; min-width: 140px; }
  .items-table td.col-name { left: 80px; width: 140px; min-width: 140px; }
  .items-table th.col-operations { right: 0; background: #FAFAFA; z-index: 2; width: 140px; min-width: 140px; position: sticky; }
  .items-table td.col-operations { right: 0; width: 140px; min-width: 140px; position: sticky; background: #fff; }
  /* Edit mode buttons */
  .btn-edit { background: #fff; color: #1677FF; border: 1px solid #1677FF; padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; margin: 2px; transition: all 0.15s; }
  .btn-edit:hover { background: #E6F4FF; }
  .btn-confirm { background: #52C41A; color: #fff; border: 1px solid #52C41A; padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; margin: 2px; transition: all 0.15s; }
  .btn-confirm:hover { background: #85CE61; }
  .btn-cancel { background: #fff; color: #00000073; border: 1px solid #D9D9D9; padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; margin: 2px; transition: all 0.15s; }
  .btn-cancel:hover { color: #000000E0; border-color: #000000E0; }
  /* Activity */
  .activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #F2F2F2; }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot { width: 8px; height: 8px; border-radius: 50%; background: #1677FF; margin-top: 6px; flex-shrink: 0; }
  .activity-time  { font-size: 12px; color: #00000040; }
  .activity-actor { font-weight: 500; color: #000000E0; }
  .activity-event { color: #000000A6; }
  /* Price log */
  .price-log-card { border: 1px solid #F0F0F0; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .price-log-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .price-log-round { font-size: 11px; background: #F0F0FF; color: #531DAB; border: 1px solid #D3ADF7; border-radius: 4px; padding: 2px 8px; margin-left: 8px; }
  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal-box { background: #fff; border-radius: 8px; width: 520px; max-width: 90vw; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .modal-header { padding: 16px 24px; border-bottom: 1px solid #F0F0F0; display: flex; align-items: center; justify-content: space-between; }
  .modal-title  { font-size: 18px; font-weight: 600; color: #000000E0; }
  .modal-close  { font-size: 16px; cursor: pointer; color: #00000073; background: none; border: none; padding: 4px; }
  .modal-body   { padding: 24px; max-height: 60vh; overflow-y: auto; }
  .modal-footer { padding: 12px 24px; border-top: 1px solid #F0F0F0; display: flex; justify-content: flex-end; gap: 8px; }
  /* Alert */
  .alert { padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
  .alert-error   { background: #FFF2F0; border: 1px solid #FFCCC7; color: #CF1322; }
  .alert-warning { background: #FFFBE6; border: 1px solid #FFE58F; color: #D46B08; }
  .alert-info    { background: #E6F4FF; border: 1px solid #91CAFF; color: #0958D9; }
  /* Descriptions */
  .desc-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .desc-label { font-size: 12px; color: #00000073; margin-bottom: 4px; }
  .desc-value { font-size: 14px; color: #000000E0; }
  .divider    { height: 1px; background: #F0F0F0; margin: 20px 0; }

    return s + itemAmount;
  }, 0);
  return { subtotal, tax: subtotal * TAX_RATE, total: subtotal * (1 + TAX_RATE) };
}

/* ─────────────────────────── Toast ─────────────────────────────────── */
function useToast() {
  const [toasts, setToasts] = React.useState([]);
  const show = (msg, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2500);
  };
  const ToastContainer = () => (
    <div style={{ position: 'fixed', top: 20, left: '50%', transform: 'translateX(-50%)', zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center', pointerEvents: 'none' }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          background: '#fff', borderRadius: 8, padding: '10px 20px',
          boxShadow: '0 4px 12px rgba(0,0,0,0.15)', display: 'flex', alignItems: 'center', gap: 10, fontSize: 14,
          border: `1px solid ${t.type === 'success' ? '#B7EB8F' : '#FFCCC7'}`
        }}>{t.msg}</div>
      ))}
    </div>
  );
  return { show, ToastContainer };
}

/* ─────────────────────────── Modal base ────────────────────────────── */
function Modal({ open, title, onClose, footer, children, width }) {
  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ width: width || 520 }}>
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

      <div style={{ marginBottom: 24 }}>

      </div>

      {/* 新增權限表單 - 僅擁有者可用 */}
      {isOwner && (
        <div className="permission-form" style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#000000D9', marginBottom: 12 }}>分享檢視權限</div>

            <div className="permission-search">
              <input
                type="text"
                placeholder="搜尋業務/諮詢名稱..."

            {showDropdown && filtered.length > 0 && (
              <div className="permission-dropdown" style={{ width: '100%', marginTop: 4 }}>

                  <div

              <div style={{ fontSize: 12, color: '#00000073', padding: 12 }}>所有人員已授予檢視權限</div>

        <div>

              <div key={perm.staffId} className="permission-item">

  );
}

/* ─────────────────────────── Status Progress Bar ────────────────────── */
function StatusProgressBar({ qr, items }) {
  const { status } = qr;
  const allStates = ['需求確認中', '待評估成本', '已評估成本', '已提供報價', '議價中'];
  const currIdx   = allStates.indexOf(status);
  const summary = calcSummary(items || []);
  return (
    <div style={{ padding: '16px 24px' }}>
      <div style={{ fontWeight: 500, marginBottom: 12 }}>狀態進度</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
        {allStates.map((s, i) => {
          const done   = i < currIdx;
          const active = s === status;
          return (
            <React.Fragment key={s}>
              <span style={{
                padding: '3px 10px', borderRadius: 4, fontSize: 12, fontWeight: active ? 600 : 400,
                background: active ? '#1677FF' : done ? '#F6FFED' : '#FAFAFA',
                color:      active ? '#fff'    : done ? '#389E0D' : '#00000040',
                border:     `1px solid ${active ? '#1677FF' : done ? '#B7EB8F' : '#F0F0F0'}`,
              }}>
                {done ? '完成  ' : ''}{s}
              </span>
              {i < allStates.length - 1 && <span style={{ color: '#D9D9D9', fontSize: 12 }}>›</span>}
            </React.Fragment>
          );
        })}
        <span style={{ color: '#D9D9D9', margin: '0 2px', fontSize: 12 }}>›</span>
        <span style={{ padding: '3px 10px', borderRadius: 4, fontSize: 12, background: status === '成交' ? '#F6FFED' : '#FAFAFA', color: status === '成交' ? '#389E0D' : '#00000040', border: `1px solid ${status === '成交' ? '#B7EB8F' : '#F0F0F0'}`, fontWeight: status === '成交' ? 600 : 400 }}>成交</span>
        <span style={{ color: '#D9D9D9', margin: '0 4px', fontSize: 12 }}>/</span>
        <span style={{ padding: '3px 10px', borderRadius: 4, fontSize: 12, background: status === '流失' ? '#FFF2F0' : '#FAFAFA', color: status === '流失' ? '#CF1322' : '#00000040', border: `1px solid ${status === '流失' ? '#FFCCC7' : '#F0F0F0'}`, fontWeight: status === '流失' ? 600 : 400 }}>流失</span>
      </div>
    </div>
  );
}

/* ─────────────────────────── State Buttons ─────────────────────────── */
function StateButtons({ qr, role, onTransition }) {
  const { status } = qr;
  if (status === '流失') return <StatusTag status="流失" />;
  if (status === '成交') return (
    <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
      {role === 'sales' && !qr.linkedOrderId && (
        <button className="btn btn-primary" onClick={() => onTransition('建立訂單')}>轉建訂單</button>
      )}
    </div>
  );
  const btns = [];
  if (status === '需求確認中' && role === 'sales')
    btns.push(<button key="send" className="btn btn-primary"  onClick={() => onTransition('送印務評估')}>送印務評估</button>);
  if (status === '待評估成本' && role === 'manager')
    btns.push(<button key="eval" className="btn btn-primary"  onClick={() => onTransition('評估完成')}>評估完成</button>);
  if (status === '已評估成本' && role === 'sales')
    btns.push(<button key="provide" className="btn btn-primary" onClick={() => onTransition('對外提供報價')}>對外提供報價</button>);
  if (status === '已提供報價' && role === 'sales')
    btns.push(<button key="neg" className="btn btn-default" onClick={() => onTransition('進入議價')}>客戶回應，進入議價</button>);
  if (status === '議價中') {
    if (role === 'sales') {
      btns.push(<button key="reassess" className="btn btn-default" onClick={() => onTransition('重新評估報價')}>重新評估報價</button>);
      btns.push(<button key="win"  className="btn btn-primary" onClick={() => onTransition('成交')}>成交</button>);
      btns.push(<button key="lose" className="btn btn-danger"  onClick={() => onTransition('流失')}>流失</button>);
    }
  }
  if (btns.length === 0)
    return <span style={{ fontSize: 13, color: '#00000040' }}>目前角色（{role === 'sales' ? '業務' : '印務主管'}）在此狀態無可用操作。</span>;
  return <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>{btns}</div>;
}

/* ─────────────────────────── Detail Page ───────────────────────────── */
function DetailPage({ qrId, data, onBack, role, updateQR, toast }) {
  const [activeTab,     setActiveTab]     = React.useState(role === 'manager' ? 'spec' : 'basic');
  const [items,         setItems]         = React.useState(() => data.find(q => q.id === qrId).items);
  const [lostOpen,      setLostOpen]      = React.useState(false);
  const [evalOpen,      setEvalOpen]      = React.useState(false);
  const [reassessOpen,  setReassessOpen]  = React.useState(false);

  const freshQR = data.find(q => q.id === qrId);
  const isOwner = freshQR.createdBy === '林雅婷'; // 模擬當前用戶
  const hasViewPermission = isOwner || (freshQR.viewPermissions && freshQR.viewPermissions.some(p => p.staffName === '林雅婷'));
  const isViewOnly = !isOwner && hasViewPermission;
  const syncItems = newItems => { setItems(newItems); updateQR(qrId, { items: newItems }); };

  const handleTransition = action => {
    if (action === '流失')           { setLostOpen(true); return; }
    if (action === '評估完成')       { setEvalOpen(true); return; }
    if (action === '重新評估報價')   { setReassessOpen(true); return; }

    const now    = new Date().toLocaleString('zh-TW').replace(/\//g, '-');
    const actor  = role === 'sales' ? '林雅婷' : '陳建宏';
    const states = { '送印務評估': '待評估成本', '對外提供報價': '已提供報價', '進入議價': '議價中', '成交': '成交', '退回重評估': '待評估成本', '重新評估報價': '待評估成本' };
    const newStatus = states[action];

    if (action === '建立訂單') {
      const orderId = `ORD-${new Date().toISOString().slice(0,10).replace(/-/g,'')}-01`;
      const log = { id: freshQR.activityLog.length + 1, time: now, actor, event: `建立關聯訂單：${orderId}` };
      updateQR(qrId, { linkedOrderId: orderId, activityLog: [...freshQR.activityLog, log] });
      toast(`訂單 ${orderId} 已建立`);
      return;
    }

    let eventText = `狀態變更：${freshQR.status} → ${newStatus}`;
    if (action === '送印務評估')  eventText += '，Slack 通知已發送';
    if (action === '退回重評估') eventText += '（退回印務重評，需調整方案）';
    if (action === '重新評估報價') eventText += '（業務申請重新評估成本）';
    const log = { id: freshQR.activityLog.length + 1, time: now, actor, event: eventText };
    updateQR(qrId, { status: newStatus, activityLog: [...freshQR.activityLog, log], updatedAt: now });
    toast(action + ' 操作成功');
  };

  const handleLost = (reason, note) => {
    const now   = new Date().toLocaleString('zh-TW').replace(/\//g, '-');
    const log   = { id: freshQR.activityLog.length + 1, time: now, actor: '林雅婷', event: `狀態變更：${freshQR.status} → 流失（原因：${reason}）` };
    updateQR(qrId, { status: '流失', lostReason: reason, lostNote: note, activityLog: [...freshQR.activityLog, log], updatedAt: now });
    setLostOpen(false);
    toast('已標記為流失');
  };

  const handleEvaluate = () => {
    const now      = new Date().toLocaleString('zh-TW').replace(/\//g, '-');
    const nextRound = (freshQR.priceLogs.length || 0) + 1;
    const snapshot = items.map(i => ({ name: i.name, costEstimate: i.costEstimate, unitPrice: i.unitPrice }));
    const newLog   = { id: nextRound, round: nextRound, evaluatedAt: now, evaluatedBy: '陳建宏（印務主管）', note: '', snapshot };
    const actLog   = { id: freshQR.activityLog.length + 1, time: now, actor: '陳建宏', event: `狀態變更：待評估成本 → 已評估成本（自動建立報價紀錄 #${nextRound}）` };
    updateQR(qrId, { status: '已評估成本', priceLogs: [...freshQR.priceLogs, newLog], activityLog: [...freshQR.activityLog, actLog], items, updatedAt: now });
    setEvalOpen(false);
    toast(`評估完成，已建立報價紀錄（第 ${nextRound} 輪）`);
  };

  const handleReassess = (note) => {
    const now   = new Date().toLocaleString('zh-TW').replace(/\//g, '-');
    let eventText = `狀態變更：${freshQR.status} → 待評估成本（業務申請重新評估成本）`;
    if (note && note.trim()) {
      eventText += `；調整說明：${note}`;
    }
    const log   = { id: freshQR.activityLog.length + 1, time: now, actor: '林雅婷', event: eventText };
    updateQR(qrId, { status: '待評估成本', activityLog: [...freshQR.activityLog, log], updatedAt: now });
    setReassessOpen(false);
    toast('已回退待評估成本，請與印務主管討論成本方案');
  };

  const tabs = role === 'manager'
    ? [
        { key: 'spec',       label: `印件規格與成本（${items.length}）` },
        { key: 'activity',   label: `活動紀錄（${freshQR.activityLog.length}）` },
      ]
    : [
        { key: 'basic',      label: '基本資料' },
        { key: 'spec',       label: `印件規格與成本（${items.length}）` },
        { key: 'pricelog',   label: `報價紀錄（${freshQR.priceLogs.length}）` },
        { key: 'activity',   label: `活動紀錄（${freshQR.activityLog.length}）` },
        { key: 'permission', label: `權限管理（${freshQR.viewPermissions?.length || 0}）` },
      ];

  return (
    <div>
      <div className="breadcrumb">
        <span onClick={onBack}>需求單管理</span>
        <span className="breadcrumb-sep">›</span>
        <span>{freshQR.quoteNo}</span>
      </div>

      {isViewOnly && (
        <div style={{ background: '#FFFBE6', border: '1px solid #FFE58F', borderRadius: 6, padding: '12px 16px', marginBottom: 16, fontSize: 14, color: '#D46B08', display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontWeight: 500 }}>你有檢視權限</span>
          <span style={{ color: '#FA8C16', fontSize: 12 }}>此需求單由 {freshQR.createdBy} 建立。你可以檢視所有資訊，但無法進行編輯。</span>
        </div>
      )}

      {/* Card 1: Project Info & Status */}
      <div style={{ background: '#fff', borderRadius: 8, border: '1px solid #F0F0F0', boxShadow: '0 1px 2px rgba(0,0,0,0.06)', marginBottom: 16, overflow: 'hidden' }}>
        {/* Title & Action Buttons Row */}
        <div style={{ padding: '20px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16 }}>
          <h1 style={{ fontSize: 18, fontWeight: 600, color: '#000000E0', margin: 0, flex: 1 }}>{freshQR.title}</h1>
          <div style={{ flexShrink: 0 }}>
            <StateButtons qr={freshQR} role={role} onTransition={handleTransition} />
          </div>
        </div>

        {/* Key Info Section */}
        <div style={{ padding: '20px 24px' }}>
          {/* Key Info Grid */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr 1fr 1fr', gap: 24 }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 500, color: '#636466', marginBottom: 6 }}>需求單號</div>
              <div style={{ fontSize: 14, fontWeight: 400, fontFamily: 'monospace', color: '#232324' }}>{freshQR.quoteNo}</div>
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 500, color: '#636466', marginBottom: 6 }}>最後更新</div>
              <div style={{ fontSize: 14, fontWeight: 400, color: '#232324' }}>{freshQR.updatedAt}</div>
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 500, color: '#636466', marginBottom: 6 }}>報價輪次</div>
              <div style={{ fontSize: 14, fontWeight: 400, color: '#232324' }}>{freshQR.priceLogs.length} 輪</div>
            </div>
            {role !== 'manager' && items && items.length > 0 && (
              <>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 500, color: '#636466', marginBottom: 6 }}>小計（未稅）</div>
                  <div style={{ fontSize: 14, fontWeight: 400, fontFamily: 'monospace', color: '#232324' }}>$ {fmtMoneyInt(calcSummary(items).subtotal)}</div>
                </div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 500, color: '#636466', marginBottom: 6 }}>稅額（5%）</div>
                  <div style={{ fontSize: 14, fontWeight: 400, fontFamily: 'monospace', color: '#232324' }}>$ {fmtMoneyInt(calcSummary(items).tax)}</div>
                </div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 500, color: '#636466', marginBottom: 6 }}>含稅總額</div>
                  <div style={{ fontSize: 14, fontWeight: 400, fontFamily: 'monospace', color: '#232324' }}>$ {fmtMoneyInt(calcSummary(items).total)}</div>
                </div>
              </>
            )}
          </div>
        </div>

        {/* Status Progress Bar */}
        <StatusProgressBar qr={freshQR} items={items} />
      </div>

      {/* Card 2: Tabs & Content */}
      <div style={{ background: '#fff', borderRadius: 8, border: '1px solid #F0F0F0', boxShadow: '0 1px 2px rgba(0,0,0,0.06)', overflow: 'hidden' }}>
        <div style={{ borderBottom: '1px solid #F0F0F0' }}>
          <div className="tabs-nav" style={{ padding: '0 24px', margin: 0 }}>
            {tabs.map(t => <div key={t.key} className={`tab-item ${activeTab === t.key ? 'active' : ''}`} onClick={() => setActiveTab(t.key)}>{t.label}</div>)}
          </div>
        </div>

        <div style={{ padding: '20px 24px' }}>
          {activeTab === 'basic'    && <BasicInfoTab qr={freshQR} status={freshQR.status} onUpdate={updateQR} isViewOnly={isViewOnly} />}
          {activeTab === 'spec'     && <ItemSpecTab items={items} setItems={syncItems} status={freshQR.status} quoteNo={freshQR.quoteNo} role={role} isViewOnly={isViewOnly} />}
          {activeTab === 'permission' && <PermissionTab qr={freshQR} onUpdatePermissions={updateQR} isOwner={isOwner} />}
          {activeTab === 'pricelog' && <PriceLogTab priceLogs={freshQR.priceLogs} />}
          {activeTab === 'activity' && <ActivityTab activityLog={freshQR.activityLog} />}
        </div>
      </div>

      <LostModal open={lostOpen} onClose={() => setLostOpen(false)} onSubmit={handleLost} />
      <EvaluateCheckModal open={evalOpen} onClose={() => setEvalOpen(false)} onSubmit={handleEvaluate} items={items} />
      <ReassessModal open={reassessOpen} onClose={() => setReassessOpen(false)} onSubmit={handleReassess} />
    </div>
  );
}

/* ─────────────────────────── List Page ─────────────────────────────── */
function ListPage({ data, onSelect, role, onCreateQR }) {
  const [quoteNoFilter, setQuoteNoFilter] = React.useState('');
  const [titleFilter,   setTitleFilter]   = React.useState('');
  const [customerFilter, setCustomerFilter] = React.useState('');
  const [statusFilter,  setStatusFilter]  = React.useState('');
  const [dateRangeFilter, setDateRangeFilter] = React.useState({ start: '', end: '' });
  const [currentManager, setCurrentManager] = React.useState('陳建宏'); // 模擬當前登入的印務主管
  const salesList = [...new Set(data.map(q => q.sales))];

  const filtered = data.filter(q => {
    const matchQuoteNo = !quoteNoFilter || q.quoteNo.includes(quoteNoFilter);
    const matchTitle = !titleFilter || q.title.includes(titleFilter);
    const matchCustomer = !customerFilter || q.customer.includes(customerFilter);
    const matchStatus = !statusFilter || q.status === statusFilter;
    const matchDateStart = !dateRangeFilter.start || new Date(q.createdAt) >= new Date(dateRangeFilter.start);
    const matchDateEnd = !dateRangeFilter.end || new Date(q.createdAt) <= new Date(dateRangeFilter.end);

    // 印務主管視角：限制為分配給自己且「待評估成本」的需求單
    if (role === 'manager') {
      const matchManager = q.estimatedByManager === currentManager;
      const matchPendingStatus = q.status === '待評估成本';
      return matchManager && matchPendingStatus;
    }

    return matchQuoteNo && matchTitle && matchCustomer && matchStatus && matchDateStart && matchDateEnd;
  });

  const handleClearFilters = () => {
    setQuoteNoFilter('');
    setTitleFilter('');
    setCustomerFilter('');
    setStatusFilter('');
    setDateRangeFilter({ start: '', end: '' });
  };

  return (
    <div>
      <div className="breadcrumb"><span>需求單管理</span></div>
      <div className="page-title">需求單管理</div>

      <div style={{ background: '#fff', borderRadius: 8, padding: 16, marginBottom: 16, border: '1px solid #F0F0F0' }}>
        <div style={{ marginBottom: 12 }}>
          <span className="filter-label" style={{ fontWeight: 500 }}>文字篩選</span>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginTop: 8 }}>
            <input
              type="text"
              placeholder="需求單編號"
              value={quoteNoFilter}
              onChange={e => setQuoteNoFilter(e.target.value)}
              className="form-select"
              style={{ padding: '6px 8px' }}
            />
            <input
              type="text"
              placeholder="案名"
              value={titleFilter}
              onChange={e => setTitleFilter(e.target.value)}
              className="form-select"
              style={{ padding: '6px 8px' }}
            />
            <input
              type="text"
              placeholder="客戶名稱"
              value={customerFilter}
              onChange={e => setCustomerFilter(e.target.value)}
              className="form-select"
              style={{ padding: '6px 8px' }}
            />
          </div>
        </div>

        <div style={{ marginBottom: 12 }}>
          <span className="filter-label" style={{ fontWeight: 500 }}>狀態篩選</span>
          <select className="form-select" style={{ width: '100%', marginTop: 8, padding: '6px 8px' }} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
            <option value="">全部狀態</option>
            {Object.keys(STATUS_TAG).map(s => <option key={s}>{s}</option>)}
          </select>
        </div>

        <div style={{ marginBottom: 12 }}>
          <span className="filter-label" style={{ fontWeight: 500 }}>建立日期範圍</span>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginTop: 8 }}>
            <input
              type="date"
              value={dateRangeFilter.start}
              onChange={e => setDateRangeFilter(prev => ({ ...prev, start: e.target.value }))}
              className="form-select"
              style={{ padding: '6px 8px' }}
            />
            <input
              type="date"
              value={dateRangeFilter.end}
              onChange={e => setDateRangeFilter(prev => ({ ...prev, end: e.target.value }))}
              className="form-select"
              style={{ padding: '6px 8px' }}
            />
          </div>
        </div>

        {role === 'manager' && (
          <div style={{ marginBottom: 12, padding: 12, background: '#F9FAFB', borderRadius: 6, border: '1px solid #E5E7EB' }}>
            <span className="filter-label" style={{ fontWeight: 500, color: '#FF4D4F' }}>模擬登入印務主管</span>
            <select className="form-select" style={{ width: '100%', marginTop: 8, padding: '6px 8px' }} value={currentManager} onChange={e => setCurrentManager(e.target.value)}>
              {PRINT_MANAGERS.map(mgr => <option key={mgr.id} value={mgr.name}>{mgr.name}</option>)}
            </select>
            <div style={{ fontSize: 12, color: '#00000073', marginTop: 6 }}>切換此選項以查看分配給不同印務主管的待評估需求單</div>
          </div>
        )}

        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="btn btn-default" onClick={handleClearFilters}>清除篩選</button>
        </div>
      </div>

      <div className="toolbar">
        <div className="toolbar-left">
          <span className="filter-label">共 {filtered.length} 筆結果</span>
        </div>
        <div className="toolbar-right">
          <button className="btn btn-default" onClick={() => {}}>刷新</button>
          {role === 'sales' && <button className="btn btn-primary" onClick={onCreateQR}>新增需求單</button>}
        </div>
      </div>

      <div className="table-wrap">
        <table>
          <thead>
            <tr>
              <th>需求單號</th><th>需求案名</th><th>客戶名稱</th>
              <th>接單業務</th><th>狀態</th><th>報價輪次</th>
              <th>報價截止日</th><th>最後更新</th>
              <th style={{ width: 80 }}>操作</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(qr => (
              <tr key={qr.id} onClick={() => onSelect(qr.id)}>
                <td style={{ fontFamily: 'monospace', color: '#1677FF', fontSize: 14, fontWeight: 400 }}>{qr.quoteNo}</td>
                <td style={{ fontSize: 14, fontWeight: 400, color: '#232324' }}>{qr.title}</td>
                <td style={{ fontSize: 14, fontWeight: 400, color: '#232324' }}>{qr.customer}</td>
                <td style={{ fontSize: 14, fontWeight: 400, color: '#232324' }}>{qr.sales}</td>
                <td style={{ fontSize: 14, fontWeight: 400, color: '#232324' }}><StatusTag status={qr.status} /></td>
                <td style={{ textAlign: 'center', fontSize: 14, fontWeight: 400, color: '#232324' }}>
                  {qr.priceLogs.length > 0
                    ? <span style={{ fontFamily: 'monospace' }}>{qr.priceLogs.length} 輪</span>
                    : <span>—</span>}
                </td>
                <td style={{ fontSize: 14, fontWeight: 400, color: qr.deadline && new Date(qr.deadline) < new Date() && qr.status !== '成交' && qr.status !== '流失' ? '#FF4D4F' : '#232324' }}>{qr.deadline || '—'}</td>
                <td style={{ fontSize: 14, fontWeight: 400, color: '#232324' }}>{qr.updatedAt}</td>
                <td onClick={e => e.stopPropagation()}>
                  <button className="btn btn-default btn-sm" onClick={() => onSelect(qr.id)}>查看</button>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && <tr><td colSpan="9" className="empty">查無符合條件的需求單</td></tr>}
          </tbody>
        </table>
        <div className="pagination">
          <span className="pagination-total">共 {filtered.length} 筆</span>
          <button className="pagination-btn">‹</button>
          <button className="pagination-btn active">1</button>
          <button className="pagination-btn">›</button>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────── App Root ──────────────────────────────── */
function App() {
  const [data,       setData]       = React.useState(initialData);
  const [view,       setView]       = React.useState('list');
  const [selectedId, setSelectedId] = React.useState(null);
  const [role,       setRole]       = React.useState('sales');
  const [createOpen, setCreateOpen] = React.useState(false);
  const { show: toast, ToastContainer } = useToast();

  const updateQR = (id, patch) => setData(d => d.map(q => q.id === id ? { ...q, ...patch } : q));

  const handleCreate = form => {
    const today   = new Date().toISOString().slice(0,10).replace(/-/g,'');
    const sameDay = data.filter(q => q.quoteNo.startsWith(`Q-${today}`)).length;
    const no      = `Q-${today}-${String(sameDay + 1).padStart(2, '0')}`;
    const now     = new Date().toLocaleString('zh-TW').replace(/\//g,'-');
    const newQR   = {
      id: 'QR' + Date.now(), quoteNo: no, title: form.title, customer: form.customer,
      sales: '林雅婷', createdBy: '林雅婷', status: '需求確認中', deadline: form.deadline, updatedAt: now, createdAt: now,
      source: form.source, invoiceType: form.invoiceType, slackUrl: '', lostReason: '', lostNote: '',
      items: [], priceLogs: [], viewPermissions: [],
      activityLog: [{ id: 1, time: now, actor: '林雅婷', event: '建立需求單，Slack 通知已發送' }],
    };
    setData(d => [newQR, ...d]);
    setCreateOpen(false);
    toast(`需求單 ${no} 建立成功`);
    setSelectedId(newQR.id);
    setView('detail');
  };

  return (
    <div>
      <ToastContainer />
      {/* Demo bar */}
      <div className="demo-bar">
        <span>Prototype 示範模式</span>
        <span style={{ margin: '0 8px', opacity: 0.4 }}>|</span>
        <span>目前角色：</span>
        <button className={`role-btn ${role === 'sales'   ? 'active' : ''}`} onClick={() => setRole('sales')}>業務</button>
        <button className={`role-btn ${role === 'manager' ? 'active' : ''}`} onClick={() => setRole('manager')}>印務主管</button>
        <span style={{ marginLeft: 16, opacity: 0.7 }}>切換角色可驗證 FR-020 角色權限</span>
      </div>

      <div className="layout">
        {/* Sidebar — 只呈現已確認開發的模組 */}
        <div className="sidebar">
          <div className="sidebar-logo">ERP 系統</div>
          <div className="nav-group-title">業務管理</div>
          <div className="nav-item active" onClick={() => setView('list')}>需求單管理</div>
        </div>

        <div className="main">
          <div className="content-area">
            {view === 'list'
              ? <ListPage data={data} onSelect={id => { setSelectedId(id); setView('detail'); }} role={role} onCreateQR={() => setCreateOpen(true)} />
              : <DetailPage qrId={selectedId} data={data} onBack={() => setView('list')} role={role} updateQR={updateQR} toast={toast} />}
          </div>
        </div>
      </div>

      <CreateQRModal open={createOpen} onClose={() => setCreateOpen(false)} onSubmit={handleCreate} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
