schema: spec-driven

context: |
  產品：印刷業 ERP 系統（生產排程 / 採購 / 倉儲 / 客戶訂單管理）
  語言：所有文件使用繁體中文
  PM：Miles
  平台限制：僅支援桌機瀏覽器（不規劃行動裝置版）

  產品背景與目標：
  - 現況：Ragic（線下訂單/工單）+ EC（線上訂單）雙系統並存，資料無法統一、角色操作重複、問題難追溯
  - 自建 ERP 動機：Ragic 退役、印刷業特殊製程需求、EC 整合、生產流程優化、Data Governance
  - 核心問題：(1) 工單資訊散落致掉單與生產錯誤 (2) 產能不透明致管理層無法判斷 (3) 角色分工不明確致責任模糊
  - 階段範疇：
    Phase 1 — EC 規格品 BOM 覆蓋率 >= 80%（建立可驗證的商品資料基礎）
    Phase 2 — 訂單流程完整完成率 >= 60%（取代 Ragic + Slack + 紙本，線下訂單全流程上線）
    Phase 3 — 訂單流程完整完成率 >= 80%（含 EC 線上訂單全自動同步）
  - 北極星指標：
    Phase 1：EC 規格品 BOM 覆蓋率（已完成 BOM 展算的品項 / EC 販售總品項）
    Phase 2/3：訂單流程完整完成率（系統內從訂單起點到出貨完成的完整流程訂單比率）
  - KPI DB（各模組可量化指標）：https://www.notion.so/0ec626299b6545fab5f7e49dffc15e9f
  - 來源：Notion 產品目標（發布版本）：https://www.notion.so/32c3886511fa81359354e33087d23f23

  核心原則：
  - Prototype 優先於實現（驗證規格與邏輯，不寫實作程式碼）
  - 邏輯驗證優於空談（附帶具體例子與計算驗証）
  - 問題優先於方案（先描述問題，再提修正）
  - 文件即規格（所有決策記錄在相關檔案）

  規格管理：
  - OpenSpec 為規格工作版本（正本），Notion 為發布版本（團隊閱讀用）
  - 規格異動在 OpenSpec 進行，確認後推到 Notion
  - Notion 資源索引（URL 正本）：memory/shared/notion-index.md

  Prototype 技術棧：React + TypeScript + Tailwind + shadcn/ui
  Prototype 路徑：/Users/b-f-03-029/sens-erp-prototype/src/

  OpenSpec Specs（23 個 main specs，完整清單見 memory/erp/spec-registry.md）：
  - 涵蓋需求單 / 諮詢 / 訂單 / 工單 / 生產任務 / 審稿 / QC / 售後等模組 specs，與狀態機 / 商業流程 / 角色 / 業務情境等跨模組 specs，及 prototype 工程 specs

  Notion 發布版本（確認後手動推送）：
  - 需求單 v1.9：https://www.notion.so/3293886511fa80998ac0e8cdf555da68
  - 訂單管理 v0.5：https://www.notion.so/32c3886511fa806bad41d755349b0567
  - 工單管理 v0.4：https://www.notion.so/32c3886511fa80f98a43def401d1edce
  - 生產任務 v0.2：https://www.notion.so/32c3886511fa806ab1d5c2b815bf9c94

  Notion 參考資源（仍在 Notion 維護，未遷入 OpenSpec）：
  - 業務情境 DB：https://www.notion.so/2b93886511fa817fbb7ff9d2b37b9e05
  - OQ Follow-up DB：https://www.notion.so/32c3886511fa808e9754ea1f18248d92
  - KPI DB：https://www.notion.so/0ec626299b6545fab5f7e49dffc15e9f

  已遷入 OpenSpec 的資源（Notion 為發布版本，不再作為工作正本）：
  - 資料欄位 → 各模組 spec § Data Model
  - User Story → 各模組 spec § Scenarios
  - 狀態機 → openspec/specs/state-machines/spec.md
  - 商業流程 → openspec/specs/business-processes/spec.md
  - 使用者角色 → openspec/specs/user-roles/spec.md

  變更管理工作流（原 erp-spec 核心原則整合）：
  - 建立 change 前：查詢 Notion OQ DB 列出相關未解 OQ（oq-manage skill）
  - 建立 proposal 前：觸發 senior-pm agent（前期介入模式），確認問題框架
  - specs/design 完成後：三視角審查（senior-pm + ceo-reviewer + erp-consultant 平行執行）
  - Notion 推送：累積數個 change 後手動決定推送時機

rules:
  explore:
    - "[2026-05-30] explore 開新需求時 MUST 跑輕量商業邏輯衝突檢查（依 lightweight-review-mode § 九 explore 變體）：讀對應領域 Vault 04-business-logic/ 卡 + 查相關 08-open-questions/ OQ，給「此方向與既有商業規則有無衝突」早期警示（附檔:行 + OQ 編號），不跑完整序列協作 Phase 1"
    - "[2026-05-30] explore 衝突檢查產「衝突筆記」交 propose Phase 1 承接深化（PM 不重掃已發現衝突）；發現衝突時攤三選項（A 繞過用既有機制 / B 推翻改既有規則 / C 待釐清開 OQ），決策權在 Miles，agent MUST NOT 替 Miles 決定方向"
  proposal:
    - 使用繁體中文撰寫
    - Capabilities 名稱使用英文 kebab-case
    - 引用 Notion 頁面時使用 [可讀名稱](URL) 格式
    - "[2026-05-19] 商業背景必須引用 ERP_Vault 對應節點：建立 proposal 時必須在 ## Why 或 ## Background 段以相對路徑 link 引用 memory/erp/ERP_Vault/ 下對應的卡（如 04-business-logic/、05-entities/、03-roles/）"
    - "[2026-05-19] OQ 操作正本變更為 Vault：建立前先查詢 ERP_Vault/08-open-questions/（oq-manage skill 已改寫），列出相關未解 OQ"
    - 觸發 senior-pm agent（前期介入模式），確認問題框架後再撰寫
  specs:
    - 使用繁體中文撰寫
    - 需求描述使用 SHALL/MUST 規範用語
    - 每個 Requirement 至少一個 Scenario（WHEN/THEN 格式）
    - Scenario 標題使用 #### （四個 #），不可用三個
    - 不使用 emoji
    - 新增或修改 Requirement 前，須確認與 state-machines / business-processes / user-roles specs 的一致性
    - "[2026-05-19] 涉及商業邏輯 / 角色 R&R / 實體關聯時，必須對照 ERP_Vault 對應卡（04-business-logic/ / 03-roles/ / 05-entities/）；發現不一致時優先更新 Vault 卡（內部正本）"
    - "[2026-05-30] 撰寫 delta 前 MUST 先枚舉所有相關既有規則：grep openspec/specs/** + ERP_Vault（04-business-logic / 05-entities / 06-state-machines / 07-scenarios / 13-user-stories）內提及本主題的既有 Requirement / 規則，逐條決定 ADDED / MODIFIED / REMOVED 再動筆（防漏看；converge change 漏看 order-management 三條 + wiki 6 卡的教訓）"
    - "[2026-05-30] ADDED vs MODIFIED 紀律：新 Requirement 若語意取代既有 Requirement / Scenario，MUST 用 ## MODIFIED Requirements（copy 完整既有再改）或 ## REMOVED，MUST NOT 用 ## ADDED——archive sync 按 exact-title 比對、ADDED 新標題只增不刪、會與被取代的舊 Requirement 物理並存致矛盾；僅對『巨大且多數不變』的 Requirement（如整個訂單狀態機）才可 ADDED 修訂局部 + archive 後手動清理舊描述"
  design:
    - 使用繁體中文撰寫
    - 著重 Prototype 設計決策，非實作程式碼
    - 參照 state-machines spec 確認狀態轉換設計
    - 參照 business-processes spec 確認計算邏輯
    - 參照 user-roles spec 確認角色權責
    - "[2026-05-19] 商業層 ground truth 在 ERP_Vault（如齊套邏輯、付款發票邏輯、難易度機制等），design 撰寫時優先引用 Vault 卡"
  tasks:
    - 使用繁體中文撰寫
    - 任務以 Prototype 驗證為導向
    - 每個任務對應可驗證的產出物
    - 使用 checkbox 格式：- [ ] X.Y 任務描述
  apply:
    - 修改 sens-erp-prototype 內 src/** 或 e2e/** 後，每個 task 完成前須執行 `npm run test:e2e:smoke` 確認最低門檻通過
    - 涉及跨模組或業務流程變更的 task 完成前，須執行 `npm run test:e2e` 完整測試組
    - 任何測試案例失敗須當場修正後才能勾選 task 完成；不允許「先推 Lovable 看」
    - 若 task 引入既有測試案例未涵蓋的新流程，須於同一 task 內補對應 Playwright 測試案例
    - 詳細 SOP 見 sens-erp-prototype/CLAUDE.md § 6 與 memory/shared/prototype-guidelines.md § 四 step 0
  verify:
    - 執行 `npm run test:e2e` 確認所有 Playwright 測試案例全部通過
    - 執行 `npm run test` 確認 vitest 基線無新增失敗（既有失敗請對照 memory/feedback_prototype_playwright.md 的已知遺留清單，不視為新增）
    - 逐一比對 tasks.md 內每個已勾選 task 對應的 prototype 變更，確認均涵蓋於對應的 Playwright 測試案例或 vitest 單元測試
    - 若 change 引入新業務流程，須先補對應 e2e 測試案例（並驗證通過）才能進入歸檔（archive）
  archive:
    - "[2026-05-19] 歸檔前 MUST 掃描 design.md / proposal.md / specs/ 內未解 `## Open Questions` section"
    - "[2026-05-19] 對每筆未解 OQ 觸發 oq-manage mode B 建 Vault OQ 卡（memory/erp/ERP_Vault/08-open-questions/<MODULE>-<NNN>-<簡述>.md），含去重流程"
    - "[2026-05-19] design.md / proposal.md 原處 OQ 條目改為「→ 對應 Vault OQ：[[<MODULE>-<NNN>-<簡述>]]」雙向引用，不刪除原 section"
    - "[2026-05-19] 已解 OQ 在 design.md 內保留「決議與理由」標注；若決議影響跨 change 商業邏輯，同步遷 Vault OQ 卡並標 status: answered"
    - "[2026-05-19] 上述步驟全部完成後才能 archive；oq-manage skill mode D 可協助批次處理"
    - "[2026-05-30] archive 後 MUST 驗證 ADDED 殘留：對每個 delta ## ADDED Requirement，確認是否語意取代某既有 main spec Requirement / Scenario；若是，手動清理被取代的舊描述（避免新舊並存矛盾，converge 9 CRITICAL 教訓）"
    - "[2026-05-30] archive 後 MUST 對齊 wiki 商業邏輯正本：依 pre-check 產出的「wiki 回補清單」，將 ERP_Vault 商業邏輯卡（04-business-logic / 05-entities / 06-state-machines / 07-scenarios / 13-user-stories）對齊本 change 已定案內容（wiki 為商業邏輯正本、openspec 為實作規格，定案後正本不可停留舊版）"
